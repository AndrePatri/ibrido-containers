name: ibrido

channels: 
  - defaults
  - pytorch
  - nvidia
  - conda-forge
  - omnia
  - robostack-staging
  # - francesco_ruscelli
  # - AndrePatri

dependencies:
  - python=3.12
  # PyTorch is installed from pip below (cu128 wheels).
  #
  # cu128 (CUDA 12.8), NOT cu130: 12.8 is the first CUDA with Blackwell / sm_120 support, so it
  # covers every GPU in the fleet (V100 sm_70, A100 sm_80, 4080S sm_89, 5090 sm_120). And because
  # it is still CUDA 12.x, minor-version compatibility lets it run on any driver >= 525 -- including
  # the 550 drivers on the older workstations. cu130 is CUDA *13* and requires a >= 580 driver
  # everywhere for no benefit on this hardware; it made the genesis env fail to init torch on a
  # 4080 SUPER box (driver 550, max CUDA 12.4). Do not "upgrade" this back to cu130.
  #
  # The Isaac py3.11 env now uses the same cu128 index; verify Isaac Sim 5.1 is happy with the
  # resulting torch version (see the caveat in mamba_env_isaac_py11.yml).
  # - cuda-toolkit
  - clang
  - compilers 
  - cmake
  - make
  # - gtest
  - pybind11
  - eigen3
  - numpy<2
  - poetry
  - python-devtools
  - casadi
  # - casadi_kin_dyn
  - pinocchio=2.*
  - quaternion
  - yaml-cpp
  - empy 
  - pyqt
  - pyqtgraph
  - pyside2
  # - catkin_pkg=1.0.0
  - catkin_pkg
  - scipy
  - pip:
    - -f https://download.pytorch.org/whl/cu128
    - torch
    - torchvision
    - numpy<2
    - pyzmq
    - pyyaml
    - pygame
    - "xacro @ git+https://github.com/c-rizz/xacro_standalone@extra_find_pkg_path"
    - flit
    - h5py
    - protobuf
    - matplotlib
    - urdf-parser-py
    - multiprocess
    - pynput==1.6.6
    - urdf_parser_py
    - psutil
    - gymnasium
    - gymnasium[mujoco]
    - tensorboard
    - wandb
