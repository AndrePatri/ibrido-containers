name: ibrido

channels: 
  - defaults
  - pytorch
  - nvidia
  - conda-forge
  - omnia
  - robostack-staging
  # - francesco_ruscelli
  # - AndrePatri

dependencies: 
  - python=3.12
  # PyTorch is installed from pip below so RTX 50xx/sm_120 can use cu128 wheels.
  # Keep the Isaac Python 3.11 env separate; do not mirror this blindly there.
  # - cuda-toolkit
  - clang
  - compilers 
  - cmake
  - make
  # - gtest
  - pybind11
  - eigen3
  - numpy<2
  - poetry
  - python-devtools
  - casadi
  # - casadi_kin_dyn
  - pinocchio=2.*
  - quaternion
  - yaml-cpp
  - empy 
  - pyqt
  - pyqtgraph
  - pyside2
  # - catkin_pkg=1.0.0
  - catkin_pkg
  - scipy
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch==2.7.0+cu128
    - torchvision==0.22.0+cu128
    - numpy<2
    - pyzmq
    - pyyaml
    - pygame
    - xacro
    - flit
    - h5py
    - protobuf
    - matplotlib
    - urdf-parser-py
    - multiprocess
    - pynput==1.6.6
    - urdf_parser_py
    - psutil
    - gymnasium
    - gymnasium[mujoco]
    - tensorboard
    - wandb
