name: ibrido_isaac_py11

channels: 
  - defaults
  - pytorch
  - nvidia
  - conda-forge
  - omnia
  - robostack-staging

dependencies:
  - python=3.11
  # PyTorch is installed from pip below (see the pip: block), NOT from the conda pytorch/nvidia
  # channels. The old spec
  #     - pytorch>2.5=*cuda*
  #     - pytorch-cuda=12.1
  # no longer solves: pytorch-cuda=12.1 pulls cuda-libraries >=12.1,<12.2 from the nvidia channel,
  # which is no longer served in a satisfiable way (PyTorch deprecated conda packaging and the
  # nvidia channel drifted). The base "ibrido" and "ibrido_genesis" envs were already migrated to
  # cu130 pip wheels (commits 16b86e5 / b673a74); this env was the last one left on the dead path.
  # - cuda-toolkit
  - clang
  - compilers 
  - cmake
  - make
  - boost
  - gtest
  - pybind11
  - eigen3
  - poetry
  - python-devtools
  - quaternion
  - yaml-cpp
  - empy 
  - pyqt
  - pyqtgraph
  - pyside2
  - catkin_pkg
  - fabric
  - pip:
    # cu130 wheels, matching the base "ibrido" env so RTX 50xx / sm_120 works. torch is left
    # unpinned = the newest build on the cu130 index.
    #
    # CAVEAT to verify on the workstation: Isaac Sim 5.1 (python 3.11) is built against a specific
    # torch, and its omni.isaac.* extensions can break on a mismatched torch major.minor. If Isaac
    # complains after this migration, pin torch here to the version Isaac Sim 5.1 ships (e.g.
    # `torch==<isaac_version>`) from the same cu130 index rather than reverting to the conda path.
    - -f https://download.pytorch.org/whl/cu130
    - torch
    - torchvision
    - pyzmq
    - pyyaml
    - "xacro @ git+https://github.com/c-rizz/xacro_standalone@extra_find_pkg_path"
    - flit
    - h5py
    - protobuf
    - matplotlib
    - scipy
    - urdf-parser-py
    - multiprocess
    - pynput==1.6.6
    - urdf_parser_py
    - psutil
    - gymnasium
    - gymnasium[mujoco]
    - tensorboard
    - wandb
