include:
- ../../../../common/runtime_defaults.yaml
- ../../../../common/algorithms/sac_default.yaml
- ../../../../robots/talos/base.yaml
- ../../../../robots/talos/control/talos.yaml
- ../../../../robots/talos/tasks/talos.yaml
- ../../../../robots/talos/backends/isaac5x.yaml
vars:
  EVAL: 1
  RESUME: 0
  DET_EVAL: 1
  EVAL_ON_CPU: 1
  OVERRIDE_ENV: 1
  OVERRIDE_AGENT_REFS: 1
  DEBUG: 0
  RMDEBUG: 0
  DUMP_ENV_CHECKPOINTS: 0
  CLUSTER_DB: 0
  PHYSICS_DT: 0.0001
  N_ENVS: 1
  WORLD_HEADLESS: 1
  TOT_STEPS: 100000  # eval length (overrides the training TOT_STEPS pulled in by tasks/talos.yaml)
  # TRAIN_ENV_CNAME / TRAIN_ENV_FNAME come from the included tasks/talos.yaml (and, when launched via
  # launch_bundle.sh, from the bundle's training contract). Do NOT blank them here or the env can't load.
  MPATH: /root/training_data/d2026_06_26_h15_m17_s29-TalosFlat_FakePosTrackEnvPhaseControl
  MNAME: d2026_06_26_h15_m17_s29-TalosFlat_FakePosTrackEnvPhaseControl_model
  COMMENT_PREFIX: eval_sim2sim_talos_isaac5x
