include:
- ../../../common/runtime_defaults.yaml
vars:
  EVAL: 1
  RESUME: 0
  REMOTE_STEPPING: 1
  DET_EVAL: 1
  EVAL_ON_CPU: 1
  OVERRIDE_ENV: 0
  OVERRIDE_AGENT_REFS: 0
  DEBUG: 0
  RMDEBUG: 0
  DUMP_ENV_CHECKPOINTS: 0
  CLUSTER_DB: 0
  ENV_IDX_BAG: -1
  ENV_IDX_BAG_DEMO: -1
  ENV_IDX_BAG_EXPL: -1
  TOT_STEPS: 1000
  WORLD_INTERFACE: aug_mpc_envs.world_interfaces.xmj_world_interface
  TIME_SOURCE: sim
  N_ENVS: 1
  XMJ_HEADLESS: 0
  WORLD_USE_CUSTOM_JNT_IMP: 0
  USE_GPU_SIM: 0
  RNAME_SUFFIX: EvalCrossSim
  COMMENT_PREFIX: eval_cross_sim
custom_args:
  perception:
    enable_height_sensor:
      dtype: bool
      value: true
    height_sensor_pixels:
      dtype: int
      value: 10
    height_sensor_resolution:
      dtype: float
      value: 0.16
    height_sensor_forward_offset:
      dtype: float
      value: 0.0
    height_sensor_lateral_offset:
      dtype: float
      value: 0.0
  world_interface:
    state_from_xbot:
      dtype: bool
      value: true
