include:
- ../../../common/runtime_defaults.yaml
vars:
  EVAL: 1
  RESUME: 0
  REMOTE_STEPPING: 1
  DET_EVAL: 1
  EVAL_ON_CPU: 1
  OVERRIDE_ENV: 0
  OVERRIDE_AGENT_REFS: 0
  DEBUG: 0
  RMDEBUG: 0
  DUMP_ENV_CHECKPOINTS: 0
  CLUSTER_DB: 0
  ENV_IDX_BAG: -1
  ENV_IDX_BAG_DEMO: -1
  ENV_IDX_BAG_EXPL: -1
  TOT_STEPS: 1000
  WORLD_INTERFACE: aug_mpc_envs.world_interfaces.rt_deploy_world_interface
  TIME_SOURCE: wall
  N_ENVS: 1
  RT_HEADLESS: 0
  WORLD_USE_CUSTOM_JNT_IMP: 0
  USE_GPU_SIM: 0
  RNAME_SUFFIX: RtReal
  COMMENT_PREFIX: rt_real
custom_args:
  world_interface:
    is_sim:
      dtype: bool
      value: false
    time_source:
      dtype: str
      value: ${TIME_SOURCE}
    state_from_xbot:
      dtype: bool
      value: true
    add_remote_exit_flag:
      dtype: bool
      value: true
