include:
- ../../../../common/runtime_defaults.yaml
- ../../../../common/algorithms/sac_discount_098.yaml
- ../../../../robots/centauro/base.yaml
- ../../../../robots/centauro/control/centauro_no_yaw_cloop.yaml
- ../../../../robots/centauro/tasks/centauro_no_yaw_cloop.yaml
- ../../../../robots/centauro/backends/rt_xbot_zmq.yaml
vars:
  TOT_STEPS: 1000  # eval length (overrides the big training TOT_STEPS from the task include)
  N_ENVS: 1
  TIME_SOURCE: wall
  RNAME_SUFFIX: RtReal
  COMMENT_PREFIX: rt_real
custom_args:
  world_interface:
    is_sim:
      dtype: bool
      value: false
    time_source:
      dtype: str
      value: ${TIME_SOURCE}
    state_from_xbot:
      dtype: bool
      value: true
    add_remote_exit_flag:
      dtype: bool
      value: true
