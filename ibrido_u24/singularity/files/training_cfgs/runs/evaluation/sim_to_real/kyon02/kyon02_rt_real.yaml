include:
- ../../../../common/runtime_defaults.yaml
- ../../../../common/algorithms/sac_default.yaml
- ../../../../robots/kyon02/base.yaml
- ../../../../robots/kyon02/control/kyon02.yaml
- ../../../../robots/kyon02/tasks/kyon02.yaml
- ../../../../robots/kyon02/backends/rt_xbot_zmq.yaml
vars:
  TIME_SOURCE: wall
  RNAME_SUFFIX: RtReal
  COMMENT_PREFIX: rt_real
  XBOT_CONFIG: KyonRLStepping/kyonrlstepping/config/xmj_env_files/kyon_real/xbot2_basic_real.yaml
custom_args:
  world_interface:
    is_sim:
      dtype: bool
      value: false
    time_source:
      dtype: str
      value: ${TIME_SOURCE}
    state_from_xbot:
      dtype: bool
      value: true
    add_remote_exit_flag:
      dtype: bool
      value: true
