vars:
  ROBOT_VARIANT: centauro_yaw_ub_cloop
  ACTION_REPEAT: 3
  COMMENT: 'centauro big wheels (actuated ankle yaw) with upper body CLOOP, '
  ENV_IDX_BAG: 4
  MPATH: ''
  N_ENVS: 800
  OVERRIDE_ENV: 0
  RNAME: CentauroCloopPartialYawUb
  SEED: 98
  SHM_NS: centauro_big_wheels_yaw_ub
  TOT_STEPS: 30000000
  TRAIN_ENV_CNAME: FakePosTrackingEnv
  TRAIN_ENV_FNAME: fake_pos_tracking_env
custom_args:
  control:
    use_jnt_v_feedback:
      dtype: bool
      value: true
    control_wheels:
      dtype: bool
      value: true
    fixed_flights:
      dtype: bool
      value: true
    adaptive_is:
      dtype: bool
      value: true
    lin_a_feedback:
      dtype: bool
      value: false
    closed_partial:
      dtype: bool
      value: true
    estimate_v_root:
      dtype: bool
      value: false
    step_height:
      dtype: float
      value: 0.1
  robot_description:
    fix_yaw:
      dtype: bool
      value: false
    self_collide:
      dtype: bool
      value: false
    add_upper_body:
      dtype: bool
      value: true
  world_interface:
    use_flat_ground:
      dtype: bool
      value: true
    use_random_pertub:
      dtype: bool
      value: false
