vars:
  ROBOT_VARIANT: centauro_ub_cloop_perception
  ACTION_REPEAT: 4
  COMMENT: centauro big wheels CLOSED with upper body, clipping rewards lb, separate discrete/cont targets (-0.1, -2.0), actions bounds refactor, flight info fix/addition, no rand pert, 10cm steps, smaller platforms, steup with coll prims, heightmap obs, FULL flight control, no omega tracking, UTD 8, track/CoT (x3 scale)/a rate, logstd log(5), 0.25 max step height
  ENV_IDX_BAG: 5
  N_ENVS: 800
  OVERRIDE_AGENT_REFS: ''
  OVERRIDE_ENV: 0
  PUB_HEIGHTMAP: 1
  RNAME: CentauroCloopPartialUbNoWheelsPercep
  SEED: 843
  SHM_NS: centauro_big_wheels_ub
  TOT_STEPS: 15000000
  TRAIN_ENV_CNAME: FakePosTrackEnvPhaseControl
  TRAIN_ENV_FNAME: fake_pos_track_env_phase_control
custom_args:
  world_interface:
    rendering_dt:
      dtype: float
      value: 0.1
    use_flat_ground:
      dtype: bool
      value: false
    ground_type:
      dtype: str
      value: stepup_prim
  perception:
    enable_height_sensor:
      dtype: bool
      value: true
    height_sensor_pixels:
      dtype: int
      value: 10
    height_sensor_resolution:
      dtype: float
      value: 0.16
    enable_height_vis:
      dtype: bool
      value: false
  training:
    use_random_pertub:
      dtype: bool
      value: false
    step_height:
      dtype: float
      value: 0.1
  control:
    use_jnt_v_feedback:
      dtype: bool
      value: true
    control_wheels:
      dtype: bool
      value: false
    fixed_flights:
      dtype: bool
      value: true
    adaptive_is:
      dtype: bool
      value: true
    lin_a_feedback:
      dtype: bool
      value: false
    closed_partial:
      dtype: bool
      value: true
    estimate_v_root:
      dtype: bool
      value: false
  robot_description:
    fix_yaw:
      dtype: bool
      value: true
    self_collide:
      dtype: bool
      value: false
    add_upper_body:
      dtype: bool
      value: true
