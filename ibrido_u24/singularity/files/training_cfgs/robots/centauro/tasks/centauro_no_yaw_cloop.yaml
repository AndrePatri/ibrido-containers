vars:
  ROBOT_VARIANT: centauro_no_yaw_cloop
  ACTION_REPEAT: 3
  COMMENT: centauro big wheels (fixed ankle yaw) CLOOP partial, joint pof0 fix (5%),, UTD 8, action rep 3, fake pos track (action rate, CoT, dir track, max_vref 1.0 m/s, max omega 0.4 rad/s,), trgt entropy -0.5
  ENV_IDX_BAG: 4
  N_ENVS: 800
  RNAME: CentauroCloopPartialNoYaw
  SEED: 98
  SHM_NS: centauro_big_wheels_no_yaw
  TOT_STEPS: 15000000
  TRAIN_ENV_CNAME: FakePosTrackingEnv
  TRAIN_ENV_FNAME: fake_pos_tracking_env
custom_args:
  control:
    use_jnt_v_feedback:
      dtype: bool
      value: true
    control_wheels:
      dtype: bool
      value: true
    fixed_flights:
      dtype: bool
      value: true
    adaptive_is:
      dtype: bool
      value: true
    lin_a_feedback:
      dtype: bool
      value: false
    closed_partial:
      dtype: bool
      value: true
    estimate_v_root:
      dtype: bool
      value: false
    step_height:
      dtype: float
      value: 0.1
  robot_description:
    fix_yaw:
      dtype: bool
      value: true
    self_collide:
      dtype: bool
      value: false
  world_interface:
    use_flat_ground:
      dtype: bool
      value: true
    use_random_pertub:
      dtype: bool
      value: true
