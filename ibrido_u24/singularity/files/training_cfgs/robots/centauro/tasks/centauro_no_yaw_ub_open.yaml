vars:
  ROBOT_VARIANT: centauro_no_yaw_ub_open
  ACTION_REPEAT: 3
  COMMENT: 'centauro big wheels (fixed ankle yaw) with upper body OPEN LOOP, '
  ENV_IDX_BAG: 95
  N_ENVS: 800
  RNAME: CentauroOpenNoYawUb
  SEED: 913
  SHM_NS: centauro_big_wheels_no_yaw_ub_open
  TOT_STEPS: 15000000
  TRAIN_ENV_CNAME: FakePosTrackingEnv
  TRAIN_ENV_FNAME: fake_pos_tracking_env
custom_args:
  control:
    control_wheels:
      dtype: bool
      value: true
    fixed_flights:
      dtype: bool
      value: true
    adaptive_is:
      dtype: bool
      value: true
    lin_a_feedback:
      dtype: bool
      value: false
    closed_partial:
      dtype: bool
      value: true
    estimate_v_root:
      dtype: bool
      value: false
  robot_description:
    fix_yaw:
      dtype: bool
      value: true
    add_upper_body:
      dtype: bool
      value: true
  world_interface:
    use_flat_ground:
      dtype: bool
      value: true
