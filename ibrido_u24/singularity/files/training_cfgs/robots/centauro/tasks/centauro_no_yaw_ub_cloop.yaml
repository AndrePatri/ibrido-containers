vars:
  ROBOT_VARIANT: centauro_no_yaw_ub_cloop
  ACTION_REPEAT: 3
  COMMENT: 'centauro big wheels (fixed ankle yaw) with upper body CLOOP, '
  ENV_IDX_BAG: 4
  MNAME: d2026_03_07_h19_m22_s30-CentauroCloopPartialNoYawUb_FakePosTrackingEnv_model
  MPATH: /root/training_data/AugMPCModels/bundles/centauro/d2026_03_07_h19_m22_s30-CentauroCloopPartialNoYawUb_FakePosTrackingEnv
  N_ENVS: 800
  OVERRIDE_ENV: 0
  RNAME: CentauroCloopPartialNoYawUb
  SEED: 98
  SHM_NS: centauro_big_wheels_no_yaw_ub
  TOT_STEPS: 30000000
  TRAIN_ENV_CNAME: FakePosTrackingEnv
  TRAIN_ENV_FNAME: fake_pos_tracking_env
custom_args:
  training:
    use_random_pertub:
      dtype: bool
      value: true
    step_height:
      dtype: float
      value: 0.1
  control:
    use_jnt_v_feedback:
      dtype: bool
      value: true
    control_wheels:
      dtype: bool
      value: true
    fixed_flights:
      dtype: bool
      value: true
    adaptive_is:
      dtype: bool
      value: true
    lin_a_feedback:
      dtype: bool
      value: false
    closed_partial:
      dtype: bool
      value: true
    estimate_v_root:
      dtype: bool
      value: false
  robot_description:
    fix_yaw:
      dtype: bool
      value: true
    self_collide:
      dtype: bool
      value: false
    add_upper_body:
      dtype: bool
      value: true
  world_interface:
    use_flat_ground:
      dtype: bool
      value: true
