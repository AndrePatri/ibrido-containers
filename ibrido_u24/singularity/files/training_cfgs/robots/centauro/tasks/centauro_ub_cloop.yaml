vars:
  ROBOT_VARIANT: centauro_ub_cloop
  ACTION_REPEAT: 3
  COMMENT: centauro big wheels CLOSED, now using same jnt imp config as robot, action rep 3, gamma 0.98, UTD 4, no entropy annhealing, fake pos track (action rate, CoT, dir track, max_vref 1.0 m/s, max omega 0.4 rad/s,)
  ENV_IDX_BAG: 5
  MNAME: d2026_02_21_h14_m01_s10-CentauroCloopPartialUbNoWheels_FakePosTrackingEnv_model
  MPATH: /root/training_data/AugMPCModels/bundles/centauro/d2026_02_21_h14_m01_s10-CentauroCloopPartialUbNoWheels_FakePosTrackingEnv
  N_ENVS: 800
  OVERRIDE_ENV: 0
  RNAME: CentauroCloopPartialUbNoWheels
  SEED: 383
  SHM_NS: centauro_big_wheels_ub
  TOT_STEPS: 15000000
  TRAIN_ENV_CNAME: FakePosTrackingEnv
  TRAIN_ENV_FNAME: fake_pos_tracking_env
custom_args:
  training:
    use_random_pertub:
      dtype: bool
      value: true
    step_height:
      dtype: float
      value: 0.1
  control:
    use_jnt_v_feedback:
      dtype: bool
      value: true
    control_wheels:
      dtype: bool
      value: false
    fixed_flights:
      dtype: bool
      value: true
    adaptive_is:
      dtype: bool
      value: true
    lin_a_feedback:
      dtype: bool
      value: false
    closed_partial:
      dtype: bool
      value: true
    estimate_v_root:
      dtype: bool
      value: false
  world_interface:
    rendering_dt:
      dtype: float
      value: 0.1
    use_flat_ground:
      dtype: bool
      value: true
    ground_type:
      dtype: str
      value: random_patches
    dh_ground:
      dtype: float
      value: 0.02
  robot_description:
    add_upper_body:
      dtype: bool
      value: true
