vars:
  ROBOT_VARIANT: talos
  ACTION_REPEAT: 3
  COMMENT: talos, new mpc/imp config, 0.1ms dt, pert, no yaw rate tracking, entropy annheal, flight phase control
  ENV_IDX_BAG: 334
  N_ENVS: 800
  REMOTE_STEPPING: 1
  RNAME: TalosFlat
  SEED: 46538
  SHM_NS: talos
  TIMEOUT_MS: 480000
  TOT_STEPS: 25000000
  TRAIN_ENV_CNAME: FakePosTrackEnvPhaseControl
  TRAIN_ENV_FNAME: fake_pos_track_env_phase_control
custom_args:
  robot_description:
    foot_collision:
      dtype: xacro
      value: thinbox
    head_type:
      dtype: xacro
      value: default
    flexibility:
      dtype: xacro
      value: false
    use_fixed_base:
      dtype: xacro
      value: false
    use_sim:
      dtype: xacro
      value: true
    enable_crane:
      dtype: xacro
      value: false
    disable_gazebo_camera:
      dtype: xacro
      value: true
    use_capsule_collision:
      dtype: xacro
      value: false
    multiple:
      dtype: xacro
      value: false
    gazebo_version:
      dtype: xacro
      value: classic
    add_upper_body:
      dtype: bool
      value: true
    self_collide:
      dtype: bool
      value: true
    minimal_coll:
      dtype: xacro
      value: true
  control:
    adaptive_is:
      dtype: bool
      value: false
    closed_partial:
      dtype: bool
      value: true
    fully_closed:
      dtype: bool
      value: false
    estimate_v_root:
      dtype: bool
      value: false
    use_jnt_v_feedback:
      dtype: bool
      value: true
    step_height:
      dtype: float
      value: 0.08
    initial_force_load_divisor:
      dtype: float
      value: 1.12
  world_interface:
    base_linkname:
      dtype: str
      value: base_link
    spawning_height:
      dtype: float
      value: 0.95
    use_random_pertub:
      dtype: bool
      value: false
    pert_target_delta_v:
      dtype: float
      value: 0.2
    pert_wrenches_rate:
      dtype: float
      value: 15.0
    use_diff_vels:
      dtype: bool
      value: false
    use_flat_ground:
      dtype: bool
      value: true
    ground_type:
      dtype: str
      value: random_tiles # random, random_patches, stepup, stepup_prim,
    dh_ground:
      dtype: float
      value: 0.05
    # per-env spawn height on non-flat terrain: each env is raised by
    # (max terrain height under a +-half_extent window) + cushion. For random_tiles, half_extent
    # must cover the feet (>= ~tile_cell_size + foot reach) or a foot lands on a taller box than the
    # base saw -> penetration -> the robot topples. cushion is the extra clearance on top.
    spawn_height_check_half_extent:
      dtype: float
      value: 0.45
    spawn_height_cushion:
      dtype: float
      value: 0.06
    static_friction:
      dtype: float
      value: 0.5
    dynamic_friction:
      dtype: float
      value: 0.5
    restitution:
      dtype: float
      value: 0.01
    ground_size:
      dtype: float
      value: 800.0
  perception:
    enable_height_sensor:
      dtype: bool
      value: false
    add_heightmap_obs:
      dtype: bool
      value: false
    height_sensor_pixels:
      dtype: int
      value: 10
    height_sensor_resolution:
      dtype: float
      value: 0.16
    enable_height_vis:
      dtype: bool
      value: false
    height_sensor_forward_offset:
      dtype: float
      value: 0.0
    height_sensor_lateral_offset:
      dtype: float
      value: 0.0
