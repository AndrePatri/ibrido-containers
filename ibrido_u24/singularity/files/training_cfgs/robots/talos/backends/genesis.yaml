vars:
  WORLD_INTERFACE: aug_mpc_envs.world_interfaces.genesis_world_interface
  TIME_SOURCE: sim
  USE_GPU_SIM: 1
  PHYSICS_DT: 0.003
  GENESIS_HEADLESS: 1
custom_args:
  world_interface:
    filter_jnt_vel:
      dtype: bool
      value: true
    filter_cutoff_freq:
      dtype: float
      value: 20.0
    filter_sampling_rate:
      dtype: int
      value: 200
    # measured contact wrenches: comma-separated robot ENTITY link names (real links, not merged/virtual
    # frames), in the MPC contact order (left, right). The genesis interface reads each link's net contact
    # force (world frame) and writes it to the cluster contact_wrenches. The number of names should match
    # n_contacts (Talos: N_CONTACTS=2). Leave empty ("") to disable (use the MPC's own contact estimate).
    contact_prims:
      dtype: str
      value: "leg_left_6_link,leg_right_6_link"
  genesis:
    genesis_render_env_idx:
      dtype: int
      value: 0
    genesis_enable_camera_rendering:
      dtype: bool
      value: false
    genesis_use_batch_renderer:
      dtype: bool
      value: false
    genesis_render_env_keyboard:
      dtype: bool
      value: false
