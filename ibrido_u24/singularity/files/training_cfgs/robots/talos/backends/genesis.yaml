vars:
  WORLD_INTERFACE: aug_mpc_envs.world_interfaces.genesis_world_interface
  TIME_SOURCE: sim
  USE_GPU_SIM: 1
  PHYSICS_DT: 0.001
custom_args:
  world_interface:
    filter_jnt_vel:
      dtype: bool
      value: false
    filter_cutoff_freq:
      dtype: float
      value: 20.0
    filter_sampling_rate:
      dtype: int
      value: 200
  genesis:
    genesis_render_env_idx:
      dtype: int
      value: 0
    genesis_enable_camera_rendering:
      dtype: bool
      value: false
    genesis_use_batch_renderer:
      dtype: bool
      value: false
    genesis_render_env_keyboard:
      dtype: bool
      value: false
