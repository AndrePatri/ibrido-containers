vars:
  ROBOT_VARIANT: kyon02_wheels
  ACTION_REPEAT: 5
  COMMENT: 'kyon02 wheels CLOSED LOOP, UTD 8, action rep 5, fake pos track (action rate, NO CoT, dir track, max_vref 1.0 m/s), trgt entropy -1.0 '
  DUMP_ENV_CHECKPOINTS: 0
  N_ENVS: 1
  RNAME: Kyon02PartialCloopWheels
  SEED: 935
  SHM_NS: kyon02_wheels
  TOT_STEPS: 5000000
  TRAIN_ENV_CNAME: FakePosTrackingEnv
  TRAIN_ENV_FNAME: fake_pos_tracking_env
custom_args:
  training:
    step_height:
      dtype: float
      value: 0.18
  robot_description:
    fix_yaw:
      dtype: bool
      value: false
    wheels:
      dtype: xacro
      value: true
    base_linkname:
      dtype: str
      value: pelvis
    self_collide:
      dtype: bool
      value: false
  control:
    fixed_flights:
      dtype: bool
      value: true
    adaptive_is:
      dtype: bool
      value: true
    lin_a_feedback:
      dtype: bool
      value: false
    closed_partial:
      dtype: bool
      value: true
    estimate_v_root:
      dtype: bool
      value: false
    use_jnt_v_feedback:
      dtype: bool
      value: true
  world_interface:
    use_flat_ground:
      dtype: bool
      value: true
