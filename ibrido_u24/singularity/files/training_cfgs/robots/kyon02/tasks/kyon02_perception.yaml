vars:
  ROBOT_VARIANT: kyon02_perception
  ACTION_REPEAT: 3
  COMMENT: kyon02 no wheels CLOSED partial, UTD 4, action rep 3, target entropy -0.5, fake pos track max 1.0 m/s (action rate, NO CoT, dir track, 1.0 omega weight
  DUMP_ENV_CHECKPOINTS: 0
  ENV_IDX_BAG: 5
  N_ENVS: 800
  PUB_HEIGHTMAP: 1
  RNAME: Kyon02PartialCloopNoWheels
  SEED: 34
  SHM_NS: kyon02_no_wheels
  TOT_STEPS: 20000000
  TRAIN_ENV_CNAME: FakePosTrackEnvPhaseControl
  TRAIN_ENV_FNAME: fake_pos_track_env_phase_control
custom_args:
  world_interface:
    rendering_dt:
      dtype: float
      value: 0.1
    use_flat_ground:
      dtype: bool
      value: false
    ground_type:
      dtype: str
      value: stepup_prim
  perception:
    enable_height_sensor:
      dtype: bool
      value: true
    height_sensor_pixels:
      dtype: float
      value: 10
    height_sensor_resolution:
      dtype: float
      value: 0.16
    enable_height_vis:
      dtype: bool
      value: false
    height_sensor_forward_offset:
      dtype: float
      value: 0.0
    height_sensor_lateral_offset:
      dtype: float
      value: 0.0
  training:
    step_height:
      dtype: float
      value: 0.1
  robot_description:
    wheels:
      dtype: xacro
      value: false
    base_linkname:
      dtype: str
      value: pelvis
    self_collide:
      dtype: bool
      value: false
  control:
    fixed_flights:
      dtype: bool
      value: true
    adaptive_is:
      dtype: bool
      value: true
    lin_a_feedback:
      dtype: bool
      value: false
    closed_partial:
      dtype: bool
      value: true
    estimate_v_root:
      dtype: bool
      value: false
    use_jnt_v_feedback:
      dtype: bool
      value: true
