vars:
  ROBOT_VARIANT: kyon02_wheels_no_yaw
  ACTION_REPEAT: 3
  COMMENT: kyon02 wheels (no yaw) CLOSED LOOP partial, gamma 0.98, NO entropy annheal [-0.3, -0.5], CoT [0.1, 0.1], self coll, 1.0 yaw rate track, 1.0 max cmd v, 0.5 max cmd omega
  ENV_IDX_BAG: 6
  N_ENVS: 800
  RNAME: Kyon02PartialCloopWheelsNoYaw
  SEED: 935
  SHM_NS: kyon02_wheels_no_yaw
  TOT_STEPS: 20000000
  TRAIN_ENV_CNAME: FakePosTrackingEnv
  TRAIN_ENV_FNAME: fake_pos_tracking_env
custom_args:
  robot_description:
    fix_yaw:
      dtype: bool
      value: true
    wheels:
      dtype: xacro
      value: true
    base_linkname:
      dtype: str
      value: pelvis
    self_collide:
      dtype: bool
      value: true
  control:
    fixed_flights:
      dtype: bool
      value: true
    adaptive_is:
      dtype: bool
      value: true
    lin_a_feedback:
      dtype: bool
      value: false
    closed_partial:
      dtype: bool
      value: true
    estimate_v_root:
      dtype: bool
      value: false
    use_jnt_v_feedback:
      dtype: bool
      value: true
    step_height:
      dtype: float
      value: 0.12
  world_interface:
    use_flat_ground:
      dtype: bool
      value: true
  training:
    add_angvel_ref_rand:
      dtype: bool
      value: true
    max_angvel_ref:
      dtype: float
      value: 0.4
    task_track_front_weight:
      dtype: float
      value: 1.0
    task_track_lat_weight:
      dtype: float
      value: 0.05
    task_track_vert_weight:
      dtype: float
      value: 0.05
    task_track_omega_x_weight:
      dtype: float
      value: 0.05
    task_track_omega_y_weight:
      dtype: float
      value: 0.05
    task_track_omega_z_weight:
      dtype: float
      value: 0.3
    
