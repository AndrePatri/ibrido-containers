vars:
  WORLD_INTERFACE: aug_mpc_envs.world_interfaces.xmj_world_interface
  TIME_SOURCE: sim
  EVAL: 1
  N_ENVS: 1
  TOT_STEPS: 1000
  DUMP_ENV_CHECKPOINTS: 0
  CLUSTER_DB: 0
  DEBUG: 0
  RMDEBUG: 0
  ENV_IDX_BAG: -1
  ENV_IDX_BAG_DEMO: -1
  ENV_IDX_BAG_EXPL: -1
  USE_GPU_SIM: 0
  XBOT_CONFIG: KyonRLStepping/kyonrlstepping/config/xmj_env_files/kyon_real/xbot2_basic_wheels.yaml
  XMJ_FILES_DIR: KyonRLStepping/kyonrlstepping/config/xmj_env_files/kyon_real
custom_args:
  world_interface:
    xmj_files_dir:
      dtype: str
      value: ${HOME}/ibrido_ws/src/${XMJ_FILES_DIR}
    xmj_timeout:
      dtype: int
      value: ${XMJ_TIMEOUT_MS}
    add_remote_exit_flag:
      dtype: bool
      value: true
