vars:
  ROBOT_VARIANT: kyon_simple
  ACTION_REPEAT: 5
  COMMENT: kyon no wheels CLOSED partial, UTD 16, action rep 5, fake pos track max 1.0 m/s (action rate, CoT, dir track, 1.0 omega weight)
  N_ENVS: 800
  RNAME: KyonSimplePartialCloopNoWheelsActRepAblation
  SEED: 4541
  SHM_NS: kyon_simple_no_wheels
  TOT_STEPS: 6000000
  TRAIN_ENV_CNAME: FakePosTrackingEnv
  TRAIN_ENV_FNAME: fake_pos_tracking_env
custom_args:
  robot_description:
    wheels:
      dtype: xacro
      value: false
  control:
    fixed_flights:
      dtype: bool
      value: true
    adaptive_is:
      dtype: bool
      value: true
    lin_a_feedback:
      dtype: bool
      value: false
    closed_partial:
      dtype: bool
      value: true
    estimate_v_root:
      dtype: bool
      value: false
    fully_closed:
      dtype: bool
      value: false
  world_interface:
    use_flat_ground:
      dtype: bool
      value: true
